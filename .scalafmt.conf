version = 3.10.7
runner.dialect = scala3

maxColumn = 100

indent.main = 2
indent.callSite = 2
indent.defnSite = 4

newlines.source = keep

rewrite.rules = [
  RedundantBraces,
  RedundantParens,
  SortModifiers
]

rewrite.scala3.convertToNewSyntax = false
rewrite.scala3.removeOptionalBraces = no

project.git = true
project.excludePaths = [
  "glob:**/target/**"
]
