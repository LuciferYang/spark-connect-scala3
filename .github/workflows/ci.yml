name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure sparse checkout for spark-upstream
        run: |
          cd spark-upstream
          git sparse-checkout init
          git sparse-checkout set sql/connect/common/src/main/protobuf/spark/connect common/sketch/src/main/java common/tags/src/main/java sql/api/src/main/java/org/apache/spark/sql/types
          cd ..

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Cache sbt launcher
        uses: actions/cache@v5
        with:
          path: build/sbt-launch-*.jar
          key: sbt-launcher-${{ hashFiles('project/build.properties') }}

      - name: Check formatting
        run: build/sbt scalafmtCheckAll

      - name: Compile
        run: build/sbt compile

      - name: Run unit tests
        run: build/sbt test

  integration-tests:
    name: Integration Tests (Spark 4.1.1)
    runs-on: ubuntu-latest
    needs: build
    env:
      SPARK_VERSION: '4.1.1'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure sparse checkout for spark-upstream
        run: |
          cd spark-upstream
          git sparse-checkout init
          git sparse-checkout set sql/connect/common/src/main/protobuf/spark/connect common/sketch/src/main/java common/tags/src/main/java sql/api/src/main/java/org/apache/spark/sql/types
          cd ..

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Cache sbt launcher
        uses: actions/cache@v5
        with:
          path: build/sbt-launch-*.jar
          key: sbt-launcher-${{ hashFiles('project/build.properties') }}

      - name: Cache Spark distribution and test jars
        uses: actions/cache@v5
        with:
          path: |
            spark-${{ env.SPARK_VERSION }}-bin-hadoop3
            spark-catalyst_2.13-${{ env.SPARK_VERSION }}-tests.jar
            h2-2.2.224.jar
          key: spark-${{ env.SPARK_VERSION }}-bin-hadoop3-v3

      - name: Download Spark ${{ env.SPARK_VERSION }}
        run: |
          if [ ! -d "spark-${SPARK_VERSION}-bin-hadoop3" ]; then
            wget -q "https://archive.apache.org/dist/spark/spark-${SPARK_VERSION}/spark-${SPARK_VERSION}-bin-hadoop3.tgz"
            tar xf "spark-${SPARK_VERSION}-bin-hadoop3.tgz"
            rm -f "spark-${SPARK_VERSION}-bin-hadoop3.tgz"
          fi
          echo "SPARK_HOME=$(pwd)/spark-${SPARK_VERSION}-bin-hadoop3" >> "$GITHUB_ENV"

      - name: Download test jars (InMemoryTableCatalog for V2 table tests)
        run: |
          CATALYST_TEST_JAR="spark-catalyst_2.13-${SPARK_VERSION}-tests.jar"
          if [ ! -f "$CATALYST_TEST_JAR" ]; then
            wget -q "https://repo1.maven.org/maven2/org/apache/spark/spark-catalyst_2.13/${SPARK_VERSION}/${CATALYST_TEST_JAR}"
          fi
          echo "CATALYST_TEST_JAR=$(pwd)/${CATALYST_TEST_JAR}" >> "$GITHUB_ENV"

      - name: Download H2 JDBC driver (for JDBC integration tests)
        run: |
          H2_VERSION="2.2.224"
          H2_JAR="h2-${H2_VERSION}.jar"
          if [ ! -f "$H2_JAR" ]; then
            wget -q "https://repo1.maven.org/maven2/com/h2database/h2/${H2_VERSION}/${H2_JAR}"
          fi
          echo "H2_JAR=$(pwd)/${H2_JAR}" >> "$GITHUB_ENV"

      - name: Start Spark Connect Server
        run: |
          mkdir -p /tmp/spark-checkpoints
          $SPARK_HOME/sbin/start-connect-server.sh \
            --jars "$CATALYST_TEST_JAR,$H2_JAR" \
            --conf spark.sql.catalog.testcat=org.apache.spark.sql.connector.catalog.InMemoryRowLevelOperationTableCatalog \
            --conf spark.checkpoint.dir=/tmp/spark-checkpoints
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if nc -z localhost 15002 2>/dev/null; then
              echo "Spark Connect server is ready"
              break
            fi
            echo "Waiting for Spark Connect server... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        run: build/sbt 'set Test / testOptions := Seq(Tests.Argument(TestFrameworks.ScalaTest, "-n", "org.apache.spark.sql.tags.IntegrationTest"))' 'testOnly *IntegrationSuite *IntegrationTestBase'

      - name: Stop Spark Connect Server
        if: always()
        run: |
          $SPARK_HOME/sbin/stop-connect-server.sh 2>/dev/null || true
