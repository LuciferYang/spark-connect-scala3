name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache sbt launcher
        uses: actions/cache@v4
        with:
          path: build/sbt-launch-*.jar
          key: sbt-launcher-${{ hashFiles('project/build.properties') }}

      - name: Check formatting
        run: build/sbt scalafmtCheckAll

      - name: Compile
        run: build/sbt compile

      - name: Run unit tests
        run: build/sbt test

  integration-tests:
    name: Integration Tests (Spark ${{ matrix.spark-version }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        spark-version: ['4.0.2', '4.1.1']
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache sbt launcher
        uses: actions/cache@v4
        with:
          path: build/sbt-launch-*.jar
          key: sbt-launcher-${{ hashFiles('project/build.properties') }}

      - name: Cache Spark distribution
        uses: actions/cache@v4
        with:
          path: spark-${{ matrix.spark-version }}-bin-hadoop3
          key: spark-${{ matrix.spark-version }}-bin-hadoop3

      - name: Download Spark ${{ matrix.spark-version }}
        run: |
          SPARK_VERSION=${{ matrix.spark-version }}
          if [ ! -d "spark-${SPARK_VERSION}-bin-hadoop3" ]; then
            wget -q "https://archive.apache.org/dist/spark/spark-${SPARK_VERSION}/spark-${SPARK_VERSION}-bin-hadoop3.tgz"
            tar xf "spark-${SPARK_VERSION}-bin-hadoop3.tgz"
            rm -f "spark-${SPARK_VERSION}-bin-hadoop3.tgz"
          fi
          echo "SPARK_HOME=$(pwd)/spark-${SPARK_VERSION}-bin-hadoop3" >> "$GITHUB_ENV"

      - name: Start Spark Connect Server
        run: |
          $SPARK_HOME/sbin/start-connect-server.sh
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if nc -z localhost 15002 2>/dev/null; then
              echo "Spark Connect server is ready"
              break
            fi
            echo "Waiting for Spark Connect server... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        run: build/sbt 'testOnly *IntegrationSuite'

      - name: Stop Spark Connect Server
        if: always()
        run: |
          $SPARK_HOME/sbin/stop-connect-server.sh 2>/dev/null || true
