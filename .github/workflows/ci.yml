name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache sbt launcher
        uses: actions/cache@v4
        with:
          path: build/sbt-launch-*.jar
          key: sbt-launcher-${{ hashFiles('project/build.properties') }}

      - name: Check formatting
        run: build/sbt scalafmtCheckAll

      - name: Compile
        run: build/sbt compile

      - name: Run unit tests
        run: build/sbt test
