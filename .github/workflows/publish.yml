name: Publish to Maven Central

on:
  push:
    tags: [ "v*" ]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: SC3-publish
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure sparse checkout for spark-upstream
        run: |
          cd spark-upstream
          git sparse-checkout init
          git sparse-checkout set sql/connect/common/src/main/protobuf/spark/connect common/sketch/src/main/java
          cd ..

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Cache sbt launcher
        uses: actions/cache@v5
        with:
          path: build/sbt-launch-*.jar
          key: sbt-launcher-${{ hashFiles('project/build.properties') }}

      - name: Publish
        run: build/sbt ci-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
